spring:
  application:
    name: minimal-not-a-bot
  datasource:
    url: ${RENDER_MINIMAL_BOT_DBURL}
    username: ${RENDER_MINIMAL_BOT_DBUSER}
    password: ${RENDER_MINIMAL_BOT_DBPW}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
